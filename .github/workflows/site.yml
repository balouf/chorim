# Build the choir static site (PDF + MIDI + MP3 + web player) and
# publish it on GitHub Pages. The build step doubles as the project's
# integration check: if Lilypond / timidity / ffmpeg-normalize / the
# template render fails, the workflow fails.
name: site

on: [push]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.8"

      - name: Set up Lilypond
        uses: codello/setup-lilypond@v0
        with:
          lilypond-version: 2.24

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        id: setup-ffmpeg
        with:
          ffmpeg-version: release

      - name: Install timidity
        run: |
          sudo apt update
          sudo apt install -y timidity

      - name: Set up venv
        run: |
          uv sync

      - name: Compile files
        run: |
          uv run python deploy.py

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
